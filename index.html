<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>投資控制台首頁</title>
  <style>
    :root {
      --bg-top: #f8f4ec;
      --bg-bottom: #efe6d6;
      --card: rgba(255, 252, 246, 0.92);
      --card-strong: #fffdf8;
      --text: #1f2937;
      --muted: #6b7280;
      --line: rgba(31, 41, 55, 0.08);
      --accent: #b7793d;
      --accent-soft: rgba(183, 121, 61, 0.12);
      --shadow: 0 18px 40px rgba(97, 73, 46, 0.12);
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(183, 121, 61, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    .app {
      width: min(100%, 460px);
      margin: 0 auto;
      padding: 20px 14px 32px;
    }

    .hero {
      padding: 22px 18px;
      border-radius: 24px;
      background: linear-gradient(160deg, rgba(255, 251, 244, 0.98), rgba(248, 239, 224, 0.9));
      border: 1px solid rgba(183, 121, 61, 0.14);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
      line-height: 1.15;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.94rem;
    }

    .summary {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .summary-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(31, 41, 55, 0.06);
    }

    .summary-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .summary-value {
      margin: 6px 0 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .summary-rate {
      display: grid;
      gap: 8px;
    }

    .summary-rate input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(31, 41, 55, 0.1);
      background: #fffdfa;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .summary-rate input:focus {
      border-color: rgba(183, 121, 61, 0.46);
      box-shadow: 0 0 0 4px rgba(183, 121, 61, 0.12);
    }

    .summary-rate-hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .reset-button {
      appearance: none;
      flex-shrink: 0;
      border: 1px solid rgba(185, 60, 60, 0.14);
      border-radius: 999px;
      background: rgba(185, 60, 60, 0.08);
      color: #b93c3c;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 8px 12px;
    }

    .section-actions {
      margin-top: 14px;
    }

    .section-button,
    .board-button {
      appearance: none;
      width: 100%;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #b7793d, #cf9462);
      color: #fffdf8;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 14px;
      box-shadow: 0 12px 24px rgba(183, 121, 61, 0.18);
    }

    .cards {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 14px 28px rgba(97, 73, 46, 0.08);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -30px -30px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--accent-soft);
    }

    .card-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.08rem;
    }

    .title-row {
      min-width: 0;
    }

    .pool-edit-form {
      position: relative;
      z-index: 1;
      margin-bottom: 14px;
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(31, 41, 55, 0.06);
    }

    .pool-edit-form[hidden] {
      display: none;
    }

    .metrics {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }

    .metric {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--card-strong);
      border: 1px solid rgba(31, 41, 55, 0.05);
    }

    .metric span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .metric strong {
      font-size: 0.96rem;
      text-align: right;
    }

    .metric-remaining.is-safe {
      background: rgba(39, 140, 87, 0.12);
      border-color: rgba(39, 140, 87, 0.16);
    }

    .metric-remaining.is-safe span,
    .metric-remaining.is-safe strong {
      color: #1f7a4e;
    }

    .metric-remaining.is-warning {
      background: rgba(219, 162, 33, 0.14);
      border-color: rgba(219, 162, 33, 0.2);
    }

    .metric-remaining.is-warning span,
    .metric-remaining.is-warning strong {
      color: #9c6a00;
    }

    .metric-remaining.is-over {
      background: rgba(196, 61, 61, 0.12);
      border-color: rgba(196, 61, 61, 0.16);
    }

    .metric-remaining.is-over span,
    .metric-remaining.is-over strong {
      color: #b93c3c;
    }

    .card-actions {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .toggle-button,
    .submit-button {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #b7793d, #cf9462);
      color: #fffdf8;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 12px 14px;
      width: 100%;
      box-shadow: 0 12px 24px rgba(183, 121, 61, 0.18);
    }

    .holding-form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(31, 41, 55, 0.06);
    }

    .holding-form[hidden] {
      display: none;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(31, 41, 55, 0.1);
      background: #fffdfa;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .field select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(31, 41, 55, 0.1);
      background: #fffdfa;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(183, 121, 61, 0.46);
      box-shadow: 0 0 0 4px rgba(183, 121, 61, 0.12);
    }

    .board-form {
      margin-top: 18px;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(31, 41, 55, 0.06);
    }

    .board-form[hidden] {
      display: none;
    }

    .holdings {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .holdings[hidden] {
      display: none;
    }

    .holding-empty,
    .holding-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(31, 41, 55, 0.06);
    }

    .holding-empty {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .holding-item-top,
    .holding-item-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .holding-item-top {
      align-items: flex-start;
    }

    .holding-main {
      min-width: 0;
    }

    .holding-item-top strong {
      font-size: 0.98rem;
    }

    .holding-item-top span,
    .holding-item-bottom span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .holding-item-bottom {
      margin-top: 8px;
    }

    .holding-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .holding-form-inline {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(31, 41, 55, 0.08);
    }

    .delete-button {
      appearance: none;
      border: 1px solid rgba(185, 60, 60, 0.14);
      background: rgba(185, 60, 60, 0.08);
      color: #b93c3c;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .edit-button {
      appearance: none;
      border: 1px solid rgba(183, 121, 61, 0.16);
      background: rgba(183, 121, 61, 0.1);
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .icon-button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(31, 41, 55, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--muted);
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .save-button {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #b7793d, #cf9462);
      color: #fffdf8;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 14px;
      width: 100%;
      box-shadow: 0 12px 24px rgba(183, 121, 61, 0.18);
    }

    .pool-hint {
      position: relative;
      z-index: 1;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .board-actions {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: center;
    }

    .board-delete-button {
      color: #b93c3c;
    }

    .empty-state {
      margin-top: 18px;
      padding: 20px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(31, 41, 55, 0.06);
      box-shadow: 0 14px 28px rgba(97, 73, 46, 0.08);
      text-align: center;
    }

    .empty-state p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .form-error {
      margin: 0;
      color: #b93c3c;
      font-size: 0.8rem;
    }

    @media (max-width: 360px) {
      .app {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card-top,
      .metric,
      .holding-item-top,
      .holding-item-bottom {
        align-items: flex-start;
        flex-direction: column;
      }

      .metric strong {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">INVESTMENT DASHBOARD</p>
      <div class="hero-head">
        <h1>投資控制台首頁</h1>
        <button type="button" class="reset-button" id="reset-data-button">重設資料</button>
      </div>
      <p class="subtitle">一眼掌握資金配置</p>
      <div class="summary">
        <div class="summary-item">
          <p class="summary-label">美元匯率設定</p>
          <div class="summary-rate">
            <input type="number" id="usd-rate-input" min="0" step="0.1" inputmode="decimal">
            <p class="summary-rate-hint">USD 1 = TWD <span id="usd-rate-label">32.5</span></p>
          </div>
        </div>
        <div class="summary-item">
          <p class="summary-label">總資金上限</p>
          <p class="summary-value" id="total-cap">NT$ 0</p>
        </div>
        <div class="summary-item">
          <p class="summary-label">換算後總投入（TWD）</p>
          <p class="summary-value" id="total-invested">NT$ 0</p>
        </div>
        <div class="summary-item">
          <p class="summary-label">換算後剩餘總額（TWD）</p>
          <p class="summary-value" id="total-remaining">NT$ 0</p>
        </div>
      </div>
      <div class="section-actions">
        <button type="button" class="section-button" id="show-board-form-button">新增投資板塊</button>
      </div>
      <form class="board-form" id="board-form" hidden>
        <div class="field">
          <label for="board-name-input">板塊名稱</label>
          <input id="board-name-input" type="text" placeholder="例如 ETF 存股系統">
        </div>
        <div class="field">
          <label for="board-cap-input">資金上限</label>
          <input id="board-cap-input" type="number" min="0" inputmode="numeric" placeholder="例如 1000000">
        </div>
        <div class="field">
          <label for="board-tone-input">標籤文字（選填）</label>
          <input id="board-tone-input" type="text" placeholder="例如 長期">
        </div>
        <p class="form-error" id="board-form-error"></p>
        <button type="submit" class="board-button">建立投資板塊</button>
      </form>
      <div class="empty-state" id="empty-state" hidden>
        <p>尚未建立投資計畫。</p>
        <button type="button" class="board-button" id="empty-add-board-button">新增投資板塊</button>
      </div>
    </section>

    <section class="cards" id="cards"></section>
  </main>

  <script>
    const STORAGE_KEY = "morige-invest-dashboard-pools";
    const EXCHANGE_RATE_KEY = "morige-invest-dashboard-usd-twd-rate";
    const MIGRATION_VERSION_KEY = "morige-invest-dashboard-migration-version";
    const DEFAULT_USD_TWD_RATE = 32.5;

    const defaultPools = [];

    const pools = loadPools();

    const cards = document.getElementById("cards");
    const emptyState = document.getElementById("empty-state");
    const resetDataButton = document.getElementById("reset-data-button");
    const showBoardFormButton = document.getElementById("show-board-form-button");
    const emptyAddBoardButton = document.getElementById("empty-add-board-button");
    const boardForm = document.getElementById("board-form");
    const boardNameInput = document.getElementById("board-name-input");
    const boardCapInput = document.getElementById("board-cap-input");
    const boardToneInput = document.getElementById("board-tone-input");
    const boardFormError = document.getElementById("board-form-error");
    const usdRateInput = document.getElementById("usd-rate-input");
    const usdRateLabel = document.getElementById("usd-rate-label");
    let usdToTwdRate = loadExchangeRate();

    function cloneDefaultPools() {
      return JSON.parse(JSON.stringify(defaultPools));
    }

    function loadExchangeRate() {
      try {
        const raw = localStorage.getItem(EXCHANGE_RATE_KEY);
        const rate = Number(raw);
        return rate > 0 ? rate : DEFAULT_USD_TWD_RATE;
      } catch (error) {
        return DEFAULT_USD_TWD_RATE;
      }
    }

    function saveExchangeRate(rate) {
      try {
        localStorage.setItem(EXCHANGE_RATE_KEY, String(rate));
      } catch (error) {
        console.warn("無法儲存匯率資料到瀏覽器。", error);
      }
    }

    function inferMarket(symbol) {
      const normalized = String(symbol || "").trim().toUpperCase();
      return /^\d{4,6}[A-Z]?$/.test(normalized) ? "TW" : "US";
    }

    function normalizeHolding(holding) {
      const symbol = String(holding?.symbol || "").trim().toUpperCase();
      const market = holding?.market || inferMarket(symbol);
      const currency = holding?.currency || (market === "TW" ? "TWD" : "USD");

      return {
        symbol,
        shares: Number(holding?.shares) || 0,
        cost: Number(holding?.cost) || 0,
        currency,
        market
      };
    }

    function normalizePool(pool, index = 0) {
      return {
        id: pool?.id || `pool-${Date.now()}-${index}`,
        name: String(pool?.name || "").trim() || `投資計畫 ${index + 1}`,
        cap: Number(pool?.cap) || 0,
        tone: String(pool?.tone || "").trim(),
        expanded: false,
        holdingsExpanded: false,
        poolEditing: false,
        holdings: Array.isArray(pool?.holdings)
          ? pool.holdings.map((holding) => normalizeHolding(holding)).filter((holding) => holding.shares > 0 && holding.cost >= 0)
          : []
      };
    }

    function loadPools() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return cloneDefaultPools();
        }

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return cloneDefaultPools();
        }

        return parsed.map((pool, index) => normalizePool(pool, index));
      } catch (error) {
        return cloneDefaultPools();
      }
    }

    function savePools() {
      try {
        const payload = pools.map((pool) => ({
          id: pool.id,
          name: pool.name,
          cap: pool.cap,
          tone: pool.tone,
          holdings: pool.holdings.map((holding) => normalizeHolding(holding))
        }));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn("無法儲存資料到瀏覽器。", error);
      }
    }

    function resetPools() {
      const firstConfirmed = window.confirm("確定要重設資料嗎？");
      if (!firstConfirmed) {
        return;
      }

      const secondConfirmed = window.confirm("這會完全刪除所有投資計畫與持股資料，無法復原，是否繼續？");
      if (!secondConfirmed) {
        return;
      }

      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(EXCHANGE_RATE_KEY);
        localStorage.removeItem(MIGRATION_VERSION_KEY);
      } catch (error) {
        console.warn("無法清除瀏覽器儲存資料。", error);
      }

      pools.splice(0, pools.length);
      usdToTwdRate = DEFAULT_USD_TWD_RATE;
      usdRateInput.value = String(DEFAULT_USD_TWD_RATE);
      hideBoardForm();
      renderCards();
    }

    function formatMoney(value, currency = "TWD") {
      const locale = currency === "USD" ? "en-US" : "zh-TW";
      const maximumFractionDigits = currency === "USD" ? 3 : 0;

      return new Intl.NumberFormat(locale, {
        style: "currency",
        currency,
        minimumFractionDigits: 0,
        maximumFractionDigits
      }).format(value);
    }

    function convertHoldingCostToTwd(holding) {
      return holding.currency === "USD" ? holding.cost * usdToTwdRate : holding.cost;
    }

    function totalInvestedInTwd() {
      return pools.reduce(
        (poolSum, pool) => poolSum + pool.holdings.reduce((holdingSum, holding) => holdingSum + convertHoldingCostToTwd(holding), 0),
        0
      );
    }

    function totalCapAmount() {
      return pools.reduce((sum, pool) => sum + pool.cap, 0);
    }

    function createMetric(label, value, currency = "TWD") {
      const row = document.createElement("div");
      row.className = "metric";
      row.innerHTML = `<span>${label}</span><strong>${formatMoney(value, currency)}</strong>`;
      return row;
    }

    function getPoolSummary(pool) {
      const investedTwd = pool.holdings.reduce((sum, holding) => sum + convertHoldingCostToTwd(holding), 0);
      const remainingTwd = pool.cap - investedTwd;
      const currencies = [...new Set(pool.holdings.map((holding) => holding.currency))];

      return {
        investedTwd,
        remainingTwd,
        isMixedCurrency: currencies.length > 1
      };
    }

    function createPoolRemainingMetric(pool, remainingTwd) {
      const row = createMetric("剩餘額度", remainingTwd, "TWD");
      const ratio = pool.cap > 0 ? remainingTwd / pool.cap : 0;
      row.classList.add("metric-remaining");

      if (remainingTwd < 0) {
        row.classList.add("is-over");
      } else if (ratio < 0.2) {
        row.classList.add("is-warning");
      } else {
        row.classList.add("is-safe");
      }

      return row;
    }

    function createInputField(labelText, type, placeholder, value = "") {
      const field = document.createElement("div");
      field.className = "field";

      const label = document.createElement("label");
      label.textContent = labelText;

      const input = document.createElement("input");
      input.type = type;
      input.placeholder = placeholder;
      input.value = value;
      if (type === "number") {
        input.inputMode = "numeric";
        input.min = "0";
      }

      field.appendChild(label);
      field.appendChild(input);
      return { field, input };
    }

    function createSelectField(labelText, options, value) {
      const field = document.createElement("div");
      field.className = "field";

      const label = document.createElement("label");
      label.textContent = labelText;

      const select = document.createElement("select");
      options.forEach((option) => {
        const element = document.createElement("option");
        element.value = option.value;
        element.textContent = option.label;
        if (option.value === value) {
          element.selected = true;
        }
        select.appendChild(element);
      });

      field.appendChild(label);
      field.appendChild(select);
      return { field, select };
    }

    function showBoardForm() {
      boardForm.hidden = false;
      boardFormError.textContent = "";
      boardNameInput.focus();
    }

    function hideBoardForm() {
      boardForm.hidden = true;
      boardForm.reset();
      boardFormError.textContent = "";
    }

    function createHoldingItem(pool, holding, index) {
      const item = document.createElement("div");
      item.className = "holding-item";
      item.innerHTML = `
        <div class="holding-item-top">
          <div class="holding-main">
            <strong>${holding.symbol}</strong>
            <span>${holding.shares} 股</span>
          </div>
        </div>
        <div class="holding-item-bottom">
          <span>持股成本</span>
          <strong>${formatMoney(holding.cost, holding.currency)}</strong>
        </div>
      `;

      const top = item.querySelector(".holding-item-top");
      const actions = document.createElement("div");
      actions.className = "holding-actions";

      const editButton = document.createElement("button");
      editButton.type = "button";
      editButton.className = "edit-button";
      editButton.textContent = "編輯";

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "delete-button";
      removeButton.textContent = "刪除";

      editButton.addEventListener("click", () => {
        const openedForm = item.querySelector(".holding-form-inline");
        if (openedForm) {
          openedForm.remove();
          return;
        }

        const form = document.createElement("form");
        form.className = "holding-form-inline";

        const symbolField = createInputField("股票代號", "text", "例如 2330", holding.symbol);
        const marketField = createSelectField("市場", [
          { value: "TW", label: "台股" },
          { value: "US", label: "美股" }
        ], holding.market);
        const currencyField = createSelectField("幣別", [
          { value: "TWD", label: "TWD" },
          { value: "USD", label: "USD" }
        ], holding.currency);
        const sharesField = createInputField("股數", "number", "例如 13000", holding.shares);
        const costField = createInputField("成本", "number", "例如 50000", holding.cost);
        const error = document.createElement("p");
        error.className = "form-error";
        const submitButton = document.createElement("button");
        submitButton.type = "submit";
        submitButton.className = "submit-button";
        submitButton.textContent = "儲存修改";

        function syncEditFields() {
          currencyField.select.value = marketField.select.value === "US" ? "USD" : "TWD";
        }

        marketField.select.addEventListener("change", syncEditFields);
        syncEditFields();

        form.appendChild(symbolField.field);
        form.appendChild(marketField.field);
        form.appendChild(currencyField.field);
        form.appendChild(sharesField.field);
        form.appendChild(costField.field);
        form.appendChild(error);
        form.appendChild(submitButton);

        form.addEventListener("submit", (event) => {
          event.preventDefault();

          const symbol = symbolField.input.value.trim().toUpperCase();
          const market = marketField.select.value;
          const currency = currencyField.select.value;
          const shares = Number(sharesField.input.value);
          const cost = Number(costField.input.value);

          if (!symbol || shares <= 0 || cost < 0) {
            error.textContent = "請完整輸入股票代號、股數與成本。";
            return;
          }

          pool.holdings[index] = normalizeHolding({ symbol, shares, cost, market, currency });
          savePools();
          renderCards();
        });

        item.appendChild(form);
      });

      removeButton.addEventListener("click", () => {
        const confirmed = window.confirm(`確定要刪除 ${holding.symbol} 這筆持股嗎？`);
        if (!confirmed) {
          return;
        }

        pool.holdings.splice(index, 1);
        savePools();
        renderCards();
      });

      actions.appendChild(editButton);
      actions.appendChild(removeButton);
      top.appendChild(actions);
      return item;
    }

    function renderCards() {
      cards.innerHTML = "";

      emptyState.hidden = pools.length > 0;

      pools.forEach((pool) => {
        const summary = getPoolSummary(pool);
        const card = document.createElement("article");
        card.className = "card";

        const top = document.createElement("div");
        top.className = "card-top";
        const titleRow = document.createElement("div");
        titleRow.className = "title-row";

        const title = document.createElement("h2");
        title.textContent = pool.tone ? `${pool.name} · ${pool.tone}` : pool.name;
        titleRow.appendChild(title);
        top.appendChild(titleRow);

        const boardActions = document.createElement("div");
        boardActions.className = "board-actions";

        const editBoardButton = document.createElement("button");
        editBoardButton.type = "button";
        editBoardButton.className = "icon-button";
        editBoardButton.setAttribute("aria-label", `編輯 ${pool.name} 板塊`);
        editBoardButton.textContent = "✏️";
        editBoardButton.addEventListener("click", () => {
          pool.poolEditing = !pool.poolEditing;
          renderCards();
        });

        const deleteBoardButton = document.createElement("button");
        deleteBoardButton.type = "button";
        deleteBoardButton.className = "icon-button board-delete-button";
        deleteBoardButton.setAttribute("aria-label", `刪除 ${pool.name} 板塊`);
        deleteBoardButton.textContent = "🗑️";
        deleteBoardButton.addEventListener("click", () => {
          const confirmed = window.confirm(`確定要刪除 ${pool.name} 整個投資板塊嗎？`);
          if (!confirmed) {
            return;
          }

          const index = pools.findIndex((item) => item.id === pool.id);
          if (index >= 0) {
            pools.splice(index, 1);
            savePools();
            renderCards();
          }
        });
        boardActions.appendChild(editBoardButton);
        boardActions.appendChild(deleteBoardButton);
        top.appendChild(boardActions);

        const poolEditForm = document.createElement("form");
        poolEditForm.className = "pool-edit-form";
        poolEditForm.hidden = !pool.poolEditing;

        const nameField = createInputField("板塊名稱", "text", "例如 ETF 存股系統", pool.name);
        const toneField = createInputField("標籤文字", "text", "例如 長期", pool.tone);
        const capField = createInputField("資金上限", "number", "例如 1000000", pool.cap);
        const poolEditError = document.createElement("p");
        poolEditError.className = "form-error";
        const poolEditSaveButton = document.createElement("button");
        poolEditSaveButton.type = "submit";
        poolEditSaveButton.className = "save-button";
        poolEditSaveButton.textContent = "儲存板塊設定";

        poolEditForm.appendChild(nameField.field);
        poolEditForm.appendChild(toneField.field);
        poolEditForm.appendChild(capField.field);
        poolEditForm.appendChild(poolEditError);
        poolEditForm.appendChild(poolEditSaveButton);

        poolEditForm.addEventListener("submit", (event) => {
          event.preventDefault();

          const nextName = nameField.input.value.trim();
          const nextTone = toneField.input.value.trim();
          const nextCap = Number(capField.input.value);

          if (!nextName || !(nextCap > 0)) {
            poolEditError.textContent = "請輸入板塊名稱與大於 0 的資金上限。";
            return;
          }

          pool.name = nextName;
          pool.tone = nextTone;
          pool.cap = nextCap;
          pool.poolEditing = false;
          savePools();
          renderCards();
        });

        const metrics = document.createElement("div");
        metrics.className = "metrics";
        metrics.appendChild(createMetric("上限", pool.cap));
        metrics.appendChild(createMetric("已投入", summary.investedTwd, "TWD"));
        metrics.appendChild(createPoolRemainingMetric(pool, summary.remainingTwd));

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const toggleButton = document.createElement("button");
        toggleButton.type = "button";
        toggleButton.className = "toggle-button";
        toggleButton.textContent = pool.expanded ? "收合表單" : "新增持股";
        toggleButton.addEventListener("click", () => {
          pool.expanded = !pool.expanded;
          renderCards();
        });

        const detailsToggleButton = document.createElement("button");
        detailsToggleButton.type = "button";
        detailsToggleButton.className = "toggle-button";
        detailsToggleButton.textContent = pool.holdingsExpanded
          ? `收合持股明細（${pool.holdings.length}）`
          : `查看持股明細（${pool.holdings.length}）`;
        detailsToggleButton.addEventListener("click", () => {
          pool.holdingsExpanded = !pool.holdingsExpanded;
          renderCards();
        });

        const form = document.createElement("form");
        form.className = "holding-form";
        form.hidden = !pool.expanded;

        const defaultMarket = pool.holdings[0]?.market || "TW";
        const defaultUnit = defaultMarket === "TW" ? "lot" : "share";
        const defaultCurrency = defaultMarket === "TW" ? "TWD" : "USD";

        const symbolField = createInputField("股票代號", "text", "例如 2330");
        const marketField = createSelectField("市場", [
          { value: "TW", label: "台股" },
          { value: "US", label: "美股" }
        ], defaultMarket);
        const unitField = createSelectField("單位", [
          { value: "share", label: "股" },
          { value: "lot", label: "張" }
        ], defaultUnit);
        const currencyField = createSelectField("幣別", [
          { value: "TWD", label: "TWD" },
          { value: "USD", label: "USD" }
        ], defaultCurrency);
        const sharesField = createInputField("數量", "number", "例如 13");
        const costField = createInputField("成本", "number", "例如 50000");
        const error = document.createElement("p");
        error.className = "form-error";
        const submitButton = document.createElement("button");
        submitButton.type = "submit";
        submitButton.className = "submit-button";
        submitButton.textContent = "確認新增";

        form.appendChild(symbolField.field);
        form.appendChild(marketField.field);
        form.appendChild(unitField.field);
        form.appendChild(currencyField.field);
        form.appendChild(sharesField.field);
        form.appendChild(costField.field);
        form.appendChild(error);
        form.appendChild(submitButton);

        function syncMarketFields() {
          if (marketField.select.value === "US") {
            unitField.select.value = "share";
            unitField.select.disabled = true;
            currencyField.select.value = "USD";
            currencyField.select.disabled = true;
            sharesField.input.placeholder = "例如 2";
          } else {
            unitField.select.disabled = false;
            currencyField.select.disabled = false;
            currencyField.select.value = "TWD";
            sharesField.input.placeholder = unitField.select.value === "lot" ? "例如 13" : "例如 13000";
          }
        }

        marketField.select.addEventListener("change", syncMarketFields);
        unitField.select.addEventListener("change", () => {
          if (marketField.select.value === "TW") {
            sharesField.input.placeholder = unitField.select.value === "lot" ? "例如 13" : "例如 13000";
          }
        });
        syncMarketFields();

        form.addEventListener("submit", (event) => {
          event.preventDefault();

          const symbol = symbolField.input.value.trim().toUpperCase();
          const market = marketField.select.value;
          const unit = unitField.select.value;
          const currency = currencyField.select.value;
          const shares = Number(sharesField.input.value);
          const cost = Number(costField.input.value);
          const actualShares = market === "TW" && unit === "lot" ? shares * 1000 : shares;

          if (!symbol || actualShares <= 0 || cost < 0) {
            error.textContent = "請完整輸入股票代號、數量與成本。";
            return;
          }

          pool.holdings.push(normalizeHolding({ symbol, shares: actualShares, cost, currency, market }));
          pool.expanded = false;
          savePools();
          renderCards();
        });

        actions.appendChild(toggleButton);
        actions.appendChild(detailsToggleButton);
        actions.appendChild(form);

        const holdings = document.createElement("div");
        holdings.className = "holdings";
        holdings.hidden = !pool.holdingsExpanded;

        if (pool.holdings.length === 0) {
          const empty = document.createElement("div");
          empty.className = "holding-empty";
          empty.textContent = "尚未新增持股。";
          holdings.appendChild(empty);
        } else {
          pool.holdings.forEach((holding, index) => {
            holdings.appendChild(createHoldingItem(pool, holding, index));
          });
        }

        card.appendChild(top);
        card.appendChild(poolEditForm);
        card.appendChild(metrics);
        if (summary.isMixedCurrency) {
          const hint = document.createElement("p");
          hint.className = "pool-hint";
          hint.textContent = "此資金池包含多種幣別，已投入與剩餘額度以 TWD 換算顯示。";
          card.appendChild(hint);
        }
        card.appendChild(actions);
        card.appendChild(holdings);
        cards.appendChild(card);
      });

      const totalCap = totalCapAmount();
      const totalInvested = totalInvestedInTwd();
      const totalRemaining = totalCap - totalInvested;

      usdRateLabel.textContent = usdToTwdRate.toString();
      document.getElementById("total-cap").textContent = formatMoney(totalCap, "TWD");
      document.getElementById("total-invested").textContent = formatMoney(totalInvested, "TWD");
      document.getElementById("total-remaining").textContent = formatMoney(totalRemaining, "TWD");
    }

    boardForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = boardNameInput.value.trim();
      const cap = Number(boardCapInput.value);
      const tone = boardToneInput.value.trim();

      if (!name || !(cap > 0)) {
        boardFormError.textContent = "請輸入板塊名稱與大於 0 的資金上限。";
        return;
      }

      pools.push(normalizePool({
        id: `pool-${Date.now()}`,
        name,
        cap,
        tone,
        holdings: []
      }, pools.length));
      savePools();
      hideBoardForm();
      renderCards();
    });

    resetDataButton.addEventListener("click", resetPools);
    showBoardFormButton.addEventListener("click", () => {
      if (boardForm.hidden) {
        showBoardForm();
      } else {
        hideBoardForm();
      }
    });
    emptyAddBoardButton.addEventListener("click", showBoardForm);
    usdRateInput.addEventListener("change", () => {
      const nextRate = Number(usdRateInput.value);
      if (!(nextRate > 0)) {
        usdRateInput.value = String(usdToTwdRate);
        return;
      }

      usdToTwdRate = nextRate;
      saveExchangeRate(usdToTwdRate);
      renderCards();
    });

    usdRateInput.value = String(usdToTwdRate);
    renderCards();
  </script>
</body>
</html>
